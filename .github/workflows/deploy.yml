name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: my-java-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build JAR ──────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ── Build Docker Image ─────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker save $IMAGE_NAME:latest | gzip > app-image.tar.gz

      # ── Connect to Tailscale ───────────────────────────────
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: "--accept-routes"

      # ── Deploy to Raspberry Pi ─────────────────────────────
      - name: Copy image to Pi
        run: |
          scp -o StrictHostKeyChecking=no \
              -i <(echo "${{ secrets.DEPLOY_SSH_KEY }}") \
              app-image.tar.gz \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/${{ secrets.DEPLOY_USER }}/auto_deploy/

      - name: Deploy on Pi
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i <(echo "${{ secrets.DEPLOY_SSH_KEY }}") \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            
            docker load < ~/app-image.tar.gz
            
            docker stop my-java-app 2>/dev/null || true
            docker rm   my-java-app 2>/dev/null || true
            
            docker run -d \
              --name my-java-app \
              --restart unless-stopped \
              -p 8080:8080 \
              my-java-app:latest
            
            sleep 3
            docker ps | grep my-java-app
            
            docker image prune -f
          EOF
