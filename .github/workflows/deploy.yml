name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [ main, dev_deploy ]

env:
  IMAGE_NAME: my_demo_app
  PROJECT_NAME: auto_deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Copy artifacts to Pi
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              target/*.jar \
              Dockerfile \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/$PROJECT_NAME/

      - name: Build and deploy on Pi
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -T \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            set -e
            cd ~/$PROJECT_NAME

            docker build -t $IMAGE_NAME:latest .
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm   $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              -p 8080:8080 \
              $IMAGE_NAME:latest
            
            sleep 3
            docker ps | grep $IMAGE_NAME
            docker image prune -f
          EOF